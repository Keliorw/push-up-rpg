name: Build Android APK

# Запуск вручную: вкладка Actions → "Build Android APK" → Run workflow.
# Ничего ставить локально не нужно — сборка идёт на серверах GitHub,
# готовый .apk скачивается артефактом. Работает и для приватного репо.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages (platform 36, build-tools, NDK, cmake)
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006" \
            "cmake;3.22.1"

      - name: Install JS dependencies
        working-directory: app
        run: npm ci

      - name: Build release APK
        working-directory: app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pushupsrpg-release-apk
          path: app/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-logs
          path: |
            app/android/app/build/outputs/logs/**
            app/android/build/reports/**
          if-no-files-found: ignore
