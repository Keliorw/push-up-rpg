name: Deploy web-game to GitHub Pages

on:
  push:
    branches:
      - push-ups-tracking-mvp
      - main
    paths:
      - "web-game/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload web-game as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The web-game/ folder becomes the site root:
          # index.html -> https://keliorw.github.io/push-up-rpg/
          path: web-game

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
