<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>push-up-rpg</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: #101828; color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        display: flex; justify-content: center;
      }
      #app { width: 100%; max-width: 480px; position: relative; }
      .screen { display: none; }
      .screen.active { display: block; }
      button { font-family: inherit; }
      .btn {
        background: #F5A623; color: #101828; border: none; border-radius: 40px;
        padding: 16px 40px; font-size: 20px; font-weight: 800; letter-spacing: 1px;
      }
      .btn:disabled { opacity: .5; }
      /* MAIN MENU (start) */
      #screen-start { position: relative; height: 100vh; overflow: hidden; padding: 0; }
      #menu-bg { position: absolute; inset: 0; z-index: 0; background: #101828; }
      #menu-bg-img, .menu-bg-video {
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; display: block;
      }
      /* Два ролика для бесшовного цикла (double-buffer): активный проявлен. */
      .menu-bg-video { opacity: 0; transition: opacity .1s ease; pointer-events: none; }
      .menu-bg-video.ready { opacity: 1; }
      #menu-buttons {
        position: absolute; left: 0; right: 0; bottom: 6vh; z-index: 1;
        display: flex; flex-direction: column; align-items: center; gap: 44px; padding: 0 20px;
      }
      .menu-btn { background: none; border: none; padding: 0; cursor: pointer;
        width: 82%; max-width: 340px; transition: transform .1s ease; }
      .menu-btn img { width: 100%; height: auto; display: block;
        filter: drop-shadow(0 4px 12px rgba(0,0,0,.6)); }
      .menu-btn:active { transform: translateY(1px) scale(.99); }
      /* MAP */
      #map-wrap { position: relative; }
      #map-img { width: 100%; display: block; }
      /* Кнопка возврата в меню — левый верхний угол карты */
      #map-back { position: absolute; top: 10px; left: 10px; z-index: 5;
        width: 56px; height: 56px; padding: 0; border: none; background: none;
        cursor: pointer; transition: transform .1s ease;
        filter: drop-shadow(0 2px 6px rgba(0,0,0,.6)); }
      #map-back img { width: 100%; height: 100%; display: block; }
      #map-back:active { transform: scale(.93); }
      .node {
        position: absolute; width: 34px; height: 34px; transform: translate(-50%, -50%);
        border-radius: 50%; border: 3px solid #fff; display: flex;
        align-items: center; justify-content: center; font-weight: 800; font-size: 16px;
        background: rgba(0,0,0,.55); color: #fff;
      }
      .node.done { background: #2e7d32; }
      .node.current { border-color: #F5A623; box-shadow: 0 0 0 4px rgba(245,166,35,.5); }
      .node.locked { opacity: .55; }
      .node.current { cursor: pointer; }
      /* CARD (превью уровня, редизайн по референсу) */
      #screen-card { padding: 0; }
      #card-content {
        min-height: 100vh;
        background: #17120e url('./games/preview-lvl-bg.png') center/cover no-repeat;
        display: flex; flex-direction: column; align-items: center;
        justify-content: flex-start; gap: 14px; padding: 3vh 18px 4vh; text-align: center;
      }
      #card-img { width: 80%; max-width: 350px; display: block;
        filter: drop-shadow(0 8px 20px rgba(0,0,0,.7)); }
      #card-target {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: clamp(20px, 6vw, 26px); font-weight: 700; color: #efe6d2;
        text-shadow: 0 0 14px rgba(120,110,190,.7), 0 2px 4px #000; margin: 6px 0 2px;
      }
      /* HP-бар: рамка health-bar.png сверху, красная заливка во внутреннем окне */
      #card-hpbar { position: relative; width: 94%; max-width: 440px; aspect-ratio: 1264 / 308; }
      #card-hpbar::after { content: ''; position: absolute; inset: 0; pointer-events: none;
        background: url('./games/health-bar.png') center/100% 100% no-repeat; }
      #card-hp-channel { position: absolute; left: 15.5%; right: 15.5%; top: 27%; bottom: 28%;
        overflow: hidden; border-radius: 4px; }
      #card-hp { display: block; height: 100%; width: 100%;
        background: linear-gradient(180deg, #ff6a56 0%, #e12626 42%, #6d0f0f 100%);
        box-shadow: inset 0 0 10px rgba(255,150,110,.5); }
      /* Кнопки-картинки с текстом */
      .img-btn { position: relative; border: none; background-color: transparent;
        background-repeat: no-repeat; background-position: center; background-size: 100% 100%;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        transition: transform .1s ease; }
      .img-btn:active { transform: translateY(1px) scale(.99); }
      .img-btn span { font-family: Georgia, 'Times New Roman', serif; font-weight: 800;
        letter-spacing: 1px; line-height: 1.05; text-transform: uppercase; }
      .img-btn--gold { width: 88%; max-width: 420px; aspect-ratio: 1099 / 567;
        padding: 2% 14% 4%; margin-top: 2px;
        background-image: url('./games/gold-button-without-text.png'); }
      .img-btn--gold span { font-size: clamp(19px, 6vw, 27px); color: #f6e9c8;
        text-shadow: 0 2px 3px #3a2408, 0 0 10px rgba(0,0,0,.5); }
      .img-btn--stone { width: 55%; max-width: 250px; aspect-ratio: 1085 / 477;
        padding: 0 16%; background-image: url('./games/stone-button-without-text.png'); }
      .img-btn--stone span { font-size: clamp(15px, 4.5vw, 20px); color: #d9dde3;
        text-shadow: 0 2px 3px #000; }
      #hint { display: none; }
      /* WORKOUT (battle UI в стиле референса) */
      #screen-workout.active { position: fixed; inset: 0; z-index: 10; background: #000;
        display: flex; align-items: center; justify-content: center; }
      /* Камера: на всю высоту экрана, не шире 600px, по центру. */
      #wk-stage { position: relative; transform: scaleX(-1); width: min(100vw, 600px); height: 100dvh;
        margin: 0 auto; overflow: hidden; background: #000; }
      #wk-video, #wk-overlay { width: 100%; height: 100%; object-fit: cover; display: block; }
      #wk-video { background: #000; }
      #wk-overlay { position: absolute; inset: 0; }
      #wk-hud { position: absolute; inset: 0; pointer-events: none; }
      /* Таймер уровня — слева сверху */
      #wk-time-box { position: absolute; top: 10px; left: 10px; background: rgba(11,17,31,.85);
        border: 1px solid #3a4a67; border-radius: 8px; padding: 4px 10px; text-align: center; }
      #wk-time-box .lbl { font-size: 9px; letter-spacing: 2px; color: #9aa4b2; }
      #wk-time { font-size: 18px; font-weight: 800; color: #fff; font-variant-numeric: tabular-nums; }
      /* Крестик выхода — справа сверху */
      #wk-back { position: absolute; top: 10px; right: 10px; z-index: 6; pointer-events: auto;
        width: 36px; height: 36px; border-radius: 50%; background: rgba(11,17,31,.85);
        border: 1px solid #3a4a67; color: #fff; font-size: 18px; line-height: 1; padding: 0; }
      /* Карточка монстра — по центру сверху */
      #wk-monster-card { position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
        width: 120px; background: rgba(11,17,31,.85); border: 1px solid #F5A623;
        border-radius: 10px; padding: 6px; text-align: center; }
      #wk-monster { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 6px; display: block; background: #000; }
      #wk-monster-name { font-size: 12px; font-weight: 800; margin-top: 3px; }
      /* HP-бар под карточкой */
      #wk-hp-wrap { position: absolute; top: 176px; left: 50%; transform: translateX(-50%);
        width: 190px; height: 20px; background: #3a0f0f; border: 1px solid #000;
        border-radius: 4px; overflow: hidden; }
      #wk-hp { height: 100%; background: #d64545; width: 100%; }
      #wk-hp-text { position: absolute; top: 176px; left: 50%; transform: translateX(-50%);
        width: 190px; text-align: center; font-size: 12px; font-weight: 800; line-height: 20px;
        text-shadow: 0 1px 2px #000; }
      #wk-set { position: absolute; top: 200px; left: 0; right: 0; text-align: center;
        font-size: 13px; color: #F5A623; text-shadow: 0 1px 3px #000; }
      /* Крупный золотой круг-счётчик — снизу по центру */
      #wk-counter { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
        width: 96px; height: 96px; border-radius: 50%; background: #F5A623; color: #101828;
        font-size: 46px; font-weight: 900; display: flex; align-items: center; justify-content: center;
        box-shadow: 0 4px 16px rgba(0,0,0,.6); border: 3px solid rgba(255,255,255,.35); }
      #wk-status { position: absolute; bottom: 122px; left: 0; right: 0; text-align: center;
        color: #F5A623; font-size: 14px; text-shadow: 0 1px 3px #000; }
      #wk-rest { position: absolute; inset: 0; display: none; align-items: center;
        justify-content: center; flex-direction: column; background: rgba(0,0,0,.8); font-size: 24px; pointer-events: auto; }
      /* VICTORY */
      #screen-victory { text-align: center; padding-top: 26vh; }
      #screen-victory h1 { color: #F5A623; font-size: 40px; font-weight: 900; }
      #victory-actions { display: flex; flex-direction: column; align-items: center;
        gap: 12px; margin-top: 28px; }
      #victory-map { background: #24314a; color: #fff; }
      #hint { font-size: 14px; color: #9aa4b2; }
      /* AUTH — фон главного меню + кнопки-картинки */
      #screen-auth.active { display: flex; align-items: center; justify-content: center;
        min-height: 100vh; padding: 24px; position: relative; overflow: hidden; }
      #auth-bg { position: absolute; inset: 0; z-index: 0; background: #101828; }
      #auth-bg-img { width: 100%; height: 100%; object-fit: cover; display: block; }
      #auth-box { position: relative; z-index: 1; width: 100%; max-width: 360px; text-align: center;
        background: rgba(11,17,31,.72); border: 1px solid #3a4a67; border-radius: 16px; padding: 26px 20px; }
      #auth-loading { color: #e6e0cf; font-size: 16px; }
      #auth-form h1 { color: #F5A623; font-size: 28px; margin: 0 0 18px; text-shadow: 0 2px 6px #000; }
      #auth-form input { display: block; width: 100%; margin: 0 0 12px; padding: 14px 16px;
        border-radius: 10px; border: 1px solid #3a4a67; background: rgba(23,32,47,.95); color: #fff; font-size: 16px; }
      #auth-form .img-btn { margin: 8px auto 0; }
      #auth-form .img-btn--gold { width: 100%; }
      #auth-form .img-btn--stone { width: 62%; }
      #auth-submit:disabled { opacity: .5; }
      #auth-error { color: #ff6a56; font-size: 14px; min-height: 18px; margin: 10px 0 2px; text-shadow: 0 1px 3px #000; }
      .link-btn { background: none; border: none; color: #9aa4b2; text-decoration: underline;
        cursor: pointer; font-size: 14px; padding: 6px; }
      /* ACCOUNT CHIP */
      #account-chip { position: absolute; top: 10px; right: 10px; z-index: 2;
        display: flex; align-items: center; gap: 8px; background: rgba(11,17,31,.8);
        border: 1px solid #3a4a67; border-radius: 20px; padding: 4px 6px 4px 12px; }
      #account-nick { font-size: 13px; font-weight: 700; color: #fff; }
      /* ARENA */
      #screen-arena { min-height: 100vh; background: #101828; }
      #arena-box { max-width: 480px; margin: 0 auto; padding: 16px; }
      #arena-box h1 { color: #F5A623; text-align: center; font-size: 26px; margin: 8px 0 16px; }
      .arena-row { display: grid; grid-template-columns: 32px 1fr auto; gap: 10px; align-items: center;
        padding: 10px 12px; border-bottom: 1px solid #24314a; font-size: 14px; }
      .arena-row .rank { color: #9aa4b2; font-weight: 800; text-align: right; }
      .arena-row .who { display: flex; flex-direction: column; }
      .arena-row .who b { color: #fff; }
      .arena-row .who span { color: #9aa4b2; font-size: 12px; }
      .arena-row .xp { color: #F5A623; font-weight: 800; white-space: nowrap; }
      .arena-row.me { background: rgba(245,166,35,.14); border-radius: 8px; }
      #arena-empty { color: #9aa4b2; text-align: center; padding: 24px; }
      /* LOADING */
      #screen-loading { min-height: 100vh; display: none; }
      #screen-loading.active { display: flex; align-items: center; justify-content: center; }
      #loading-box { text-align: center; color: #e6e0cf; }
      #loading-text { margin-top: 16px; font-size: 16px; }
      .spinner { width: 44px; height: 44px; margin: 0 auto; border-radius: 50%;
        border: 4px solid #24314a; border-top-color: #F5A623; animation: spin 0.9s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app">
      <section id="screen-auth" class="screen active">
        <div id="auth-bg"><img id="auth-bg-img" src="./games/main-menu-bg.png" alt="" /></div>
        <div id="auth-box">
          <div id="auth-loading">Загрузка…</div>
          <div id="auth-form" style="display:none">
            <h1 id="auth-title">Вход</h1>
            <input id="auth-nick" autocomplete="username" placeholder="Логин" />
            <input id="auth-pass" type="password" autocomplete="current-password" placeholder="Пароль" />
            <button class="img-btn img-btn--gold" id="auth-submit"><span>Войти</span></button>
            <div id="auth-error"></div>
            <button class="img-btn img-btn--stone" id="auth-toggle"><span>Регистрация</span></button>
          </div>
        </div>
      </section>

      <section id="screen-loading" class="screen">
        <div id="loading-box">
          <div class="spinner"></div>
          <div id="loading-text">Загрузка уровня…</div>
          <button id="loading-back" class="link-btn" style="display:none">← В меню</button>
        </div>
      </section>

      <section id="screen-start" class="screen">
        <div id="menu-bg">
          <img id="menu-bg-img" src="./games/main-menu-bg.png" alt="" />
          <video id="menu-bg-video" class="menu-bg-video" src="./games/animated-main-menu.mp4"
                 muted autoplay playsinline webkit-playsinline preload="auto" tabindex="-1"
                 disablepictureinpicture controlslist="nodownload noplaybackrate nofullscreen"></video>
          <video id="menu-bg-video-b" class="menu-bg-video" src="./games/animated-main-menu.mp4"
                 muted playsinline preload="auto" tabindex="-1" disablepictureinpicture
                 controlslist="nodownload noplaybackrate nofullscreen"></video>
        </div>
        <div id="account-chip" style="display:none">
          <span id="account-nick"></span>
          <button id="btn-logout" class="link-btn">Выйти</button>
        </div>
        <div id="menu-buttons">
          <button class="menu-btn" id="btn-campaign">
            <img src="./games/campaniy.png" alt="Кампания" />
          </button>
          <button class="menu-btn" id="btn-arena">
            <img src="./games/arena.png" alt="Arena" />
          </button>
        </div>
      </section>

      <section id="screen-map" class="screen">
        <div id="map-wrap">
          <img id="map-img" src="./games/map.png" alt="map" />
          <button id="map-back" aria-label="В меню">
            <img src="./games/back-in-map.png" alt="" />
          </button>
          <!-- node markers injected by JS -->
        </div>
      </section>

      <section id="screen-card" class="screen">
        <div id="card-content">
          <img id="card-img" alt="enemy" />
          <div id="card-target"></div>
          <div id="card-hpbar">
            <div id="card-hp-channel"><i id="card-hp"></i></div>
          </div>
          <button class="img-btn img-btn--gold" id="card-start-btn"><span>Начать тренировку</span></button>
          <button class="img-btn img-btn--stone" id="card-back-btn"><span>Назад</span></button>
          <div id="hint"></div>
        </div>
      </section>

      <section id="screen-workout" class="screen">
        <div id="wk-stage">
          <video id="wk-video" playsinline muted></video>
          <canvas id="wk-overlay"></canvas>
        </div>
        <button id="wk-back" aria-label="Выход">✕</button>
        <div id="wk-hud">
          <div id="wk-time-box"><div class="lbl">TIME</div><div id="wk-time">0:00</div></div>
          <div id="wk-monster-card">
            <img id="wk-monster" alt="" />
            <div id="wk-monster-name"></div>
          </div>
          <div id="wk-hp-wrap"><div id="wk-hp"></div></div>
          <div id="wk-hp-text"></div>
          <div id="wk-set"></div>
          <div id="wk-status"></div>
          <div id="wk-counter">0</div>
        </div>
        <div id="wk-rest"></div>
      </section>

      <section id="screen-arena" class="screen">
        <div id="arena-box">
          <button id="arena-back" class="link-btn">← В меню</button>
          <h1>Рейтинг</h1>
          <div id="arena-list">Загрузка…</div>
        </div>
      </section>

      <section id="screen-victory" class="screen">
        <h1>Повержен!</h1>
        <div id="victory-name"></div>
        <div id="victory-actions">
          <button class="btn" id="victory-next">Следующий монстр</button>
          <button class="btn" id="victory-map">На карту</button>
        </div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
